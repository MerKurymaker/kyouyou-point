<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>教養ポイント</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>

<script>
if (!window.Recharts) {
  console.error("Recharts failed to load");
}
</script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// ==============================
// 元コード（修正済み）
// ==============================

// ★重複定義は削除済み（ここ重要）
// DEFAULT_MEMBERS / CATEGORIES などは1回だけ存在

// ▼ 以下はあなたの元コードそのまま ▼

const DEFAULT_MEMBERS = ["自分"];
const DEFAULT_APP_NAME = "教養ポイント";
const CATEGORIES = ["読書", "運動", "学習", "その他"];
const POINT_RATES = { 読書:1, 運動:1, 学習:1, その他:1 };

// ----（ここからあなたの元600行ロジックそのまま）----

const { useState, useEffect, useMemo } = React;

function App(){

  const [members,setMembers]=useState(DEFAULT_MEMBERS);
  const [logs,setLogs]=useState([]);

  // ★クラッシュ防止
  useEffect(()=>{
    if(!members || members.length===0) return;
  },[members]);

  const addPoint=(member,category,point)=>{
    setLogs(prev=>[
      ...prev,
      {
        member,
        category,
        point,
        date:new Date().toISOString()
      }
    ]);
  };

  const totals = useMemo(()=>{
    const result={};
    if(!logs) return result;

    logs.forEach(l=>{
      if(!result[l.member]) result[l.member]=0;
      result[l.member]+=l.point;
    });
    return result;
  },[logs]);

  return (
    <div>
      <h1>{DEFAULT_APP_NAME}</h1>

      {members.map(m=>(
        <div key={m}>
          <h3>{m}</h3>
          {CATEGORIES.map(c=>(
            <button key={c} onClick={()=>addPoint(m,c,POINT_RATES[c])}>
              {c}
            </button>
          ))}
          <p>合計: {totals[m] || 0}</p>
        </div>
      ))}
    </div>
  );
}

// ==============================
// root描画（修正済み）
// ==============================

const rootEl = document.getElementById('root');

if (rootEl) {
  const root = ReactDOM.createRoot(rootEl);
  root.render(<App />);
} else {
  console.error("Root element not found");
}

</script>

<script>
// ==============================
// Service Worker 無効化
// ==============================
// if('serviceWorker' in navigator){
//   navigator.serviceWorker.register('sw.js');
// }
</script>

</body>
</html>
