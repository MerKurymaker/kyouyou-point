function getTitle(pts) {
  let t = TITLES[0];
  for (const x of TITLES) { if (pts >= x.min) t = x; }
  const nx = TITLES.find((x) => x.min > pts);
  return { ...t, next: nx, progress: nx ? (pts - t.min) / (nx.min - t.min) : 1 };
}

function recommend(member, entries, interests, wishlist, dismissed, filterCat, filterLang) {
  const me = entries.filter((e) => e.member === member);
  const allTitles = new Set(entries.map((e) => e.title));
  const wishTitles = new Set((wishlist || []).map((w) => w.title));
  const dSet = new Set(dismissed || []);

  const myTags = {};
  me.forEach((e) => { (e.tags || []).forEach((t) => { myTags[t] = (myTags[t]||0) + (e.rating >= 4 ? 3 : e.rating >= 3 ? 1 : 0); }); });
  (interests || []).forEach((i) => { myTags[i] = (myTags[i]||0) + 5; });

  const othersHigh = {};
  entries.filter((e) => e.member !== member && e.rating >= 4 && e.recommendation >= 60).forEach((e) => { othersHigh[e.title] = (othersHigh[e.title]||0) + 1; });

  const catCount = {};
  me.forEach((e) => { catCount[e.category] = (catCount[e.category]||0) + 1; });
  const totalCat = Object.values(catCount).reduce((a,b) => a+b, 0) || 1;

  let pool = CATALOG.filter((c) => !allTitles.has(c.title) && !wishTitles.has(c.title) && !dSet.has(c.title));
  if (filterCat && filterCat !== "all") pool = pool.filter((c) => c.category === filterCat);
  if (filterLang && filterLang !== "all") pool = pool.filter((c) => c.lang === filterLang);

  return pool.map((item) => {
    let score = 0;
    let reasons = [];
    const tagMatch = (item.tags||[]).filter((t) => myTags[t] > 0);
    score += tagMatch.reduce((s,t) => s + myTags[t], 0);
    if (tagMatch.length >= 2) reasons.push(`${tagMatch.slice(0,2).join("・")}好きにぴったり`);
    if (othersHigh[item.title]) { score += othersHigh[item.title]*5; reasons.push("仲間が高評価"); }
    const catRatio = (catCount[item.category]||0) / totalCat;
    if (catRatio < 0.1) { score += 8; reasons.push(`${item.category}の新たな冒険`); }
    const iMatch = (item.tags||[]).filter((t) => (interests||[]).includes(t));
    if (iMatch.length > 0 && !reasons.some((r) => r.includes("ぴったり"))) { score += iMatch.length*4; reasons.push(`${iMatch[0]}に興味あり`); }
    return { ...item, score, reason: reasons[0] || `${item.category}の名作`, match: score>=15?"high":score>=8?"medium":"low" };
  }).sort((a,b) => b.score - a.score).slice(0, 6);
}

function filterByPeriod(entries, period) {
  if (period === "all") return entries;
  const now = new Date(); let cutoff;
  if (period === "12m") cutoff = new Date(now.getFullYear()-1, now.getMonth(), now.getDate());
  else if (period === "3m") cutoff = new Date(now.getFullYear(), now.getMonth()-3, now.getDate());
  else if (period === "ytd") cutoff = new Date(now.getFullYear(), 0, 1);
  else return entries;
  return entries.filter((e) => e.date && e.date >= cutoff.toISOString().split("T")[0]);
}
function calcDev(scores) {
  if (scores.length < 2) return scores.map(() => 50);
  const m = scores.reduce((a,b) => a+b, 0) / scores.length;
  const sd = Math.sqrt(scores.reduce((s,x) => s+(x-m)**2, 0) / scores.length);
  return sd === 0 ? scores.map(() => 50) : scores.map((x) => Math.round(50+10*(x-m)/sd));
}

/* ═══ Components ═══ */
function CatPill({cat}){ return <span style={{display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:CC[cat]+"22",color:CC[cat],border:`1px solid ${CC[cat]}40`}}>{cat}</span>; }
function RatingDisplay({value}){ const n=Math.round(value||0); return <span style={{fontSize:11,color:"#FF9500"}}>{"★".repeat(n)}{"☆".repeat(5-n)} {(value||0).toFixed(1)}</span>; }
function TagChips({tags}){ if(!tags?.length)return null; return <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>{tags.map((t)=><span key={t} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:"var(--tag-bg)",color:"var(--tag-fg)",fontWeight:600}}>#{t}</span>)}</div>; }
function BookSpine({entry,onClick,idx}){ const c=CC[entry.category]; const h=90+(entry.title.length%5)*10; return <div onClick={onClick} className="bsp" style={{width:36,height:h,borderRadius:"3px 6px 6px 3px",cursor:"pointer",background:`linear-gradient(180deg,${c},${c}AA)`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`2px 2px 8px ${c}40`,borderLeft:`3px solid ${c}CC`,animation:`si .5s ease ${idx*.03}s both`}}><div style={{writingMode:"vertical-rl",textOrientation:"mixed",fontSize:9,fontWeight:700,color:"#fff",overflow:"hidden",maxHeight:h-14,padding:"6px 2px",textShadow:"0 1px 2px rgba(0,0,0,.4)"}}>{entry.title.length>8?entry.title.slice(0,8)+"…":entry.title}</div></div>; }
function ChartTip({active,payload,label}){ if(!active||!payload?.length)return null; return <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 16px",boxShadow:"0 8px 24px rgba(0,0,0,.12)",fontSize:12}}><div style={{fontWeight:700,marginBottom:8,color:"var(--text)"}}>{label}</div>{payload.map((p)=><div key={p.dataKey} style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,color:"var(--text)"}}><span style={{width:10,height:10,borderRadius:5,background:p.color,display:"inline-block"}}/><span style={{color:"var(--sub)",flex:1}}>{fn(p.dataKey)}</span><span style={{fontWeight:700}}>{p.value}pt</span></div>)}</div>; }
function buildTimeline(entries,members){const s=entries.filter((e)=>e.date).sort((a,b)=>a.date.localeCompare(b.date));if(!s.length)return[];const ms=[...new Set(s.map((e)=>e.date.slice(0,7)))].sort();const c={};members.forEach((m)=>{c[m]=0;});return ms.map((ym)=>{s.filter((e)=>e.date.slice(0,7)===ym).forEach((e)=>{c[e.member]=(c[e.member]||0)+cp(e.category,e.count);});const r={month:ym.replace("-","/")};members.forEach((m)=>{r[m]=Math.round((c[m]||0)*10)/10;});return r;});}

      <div style={{maxWidth:720,margin:"0 auto",padding:"24px 16px"}}>

        {/* ══ DASHBOARD ══ */}
        {view==="dashboard"&&<div>
          {rankings[0]?.total>0&&(()=>{const r=rankings[0];const tt=r.title;const dev=deviations[r.member];return(
            <div className="cd" style={{padding:24,marginBottom:16,background:dark?"linear-gradient(135deg,#1C1C1E,#2A2040)":"linear-gradient(135deg,#fff,#FFF8F0)",border:`1px solid ${dark?"#38383A":"#FFD70030"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:36}}>👑</div><div className="devbox" style={{width:40,height:40,fontSize:14,background:`linear-gradient(135deg,${devColor(dev)},${devColor(dev)}AA)`}}>{dev}</div><div style={{fontSize:9,color:"var(--sub)"}}>偏差値</div></div>
                <div style={{flex:1}}><div style={{fontSize:12,color:"var(--sub)",fontWeight:600}}>現在1位</div><div style={{fontSize:22,fontWeight:700}}>{r.member}</div><div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"#FFD70020",color:"#B8860B",fontWeight:600}}>{tt.emoji} {tt.name}</span><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"#007AFF15",color:"#007AFF",fontWeight:600}}>{r.type.emoji} {r.type.name}</span></div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:36,fontWeight:800,background:"linear-gradient(135deg,#FFD700,#FF9500)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{r.total.toFixed(1)}</div><div style={{fontSize:12,color:"var(--sub)"}}>pts</div></div>
              </div>
              {tt.next&&<div style={{marginTop:14}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--sub)",marginBottom:4}}><span>{tt.emoji} {tt.name}</span><span>次: {tt.next.emoji} {tt.next.name} ({tt.next.min}pt)</span></div><div className="pb"><div className="pf" style={{width:`${tt.progress*100}%`,background:"linear-gradient(90deg,#FFD700,#FF9500)"}}/></div></div>}
            </div>);})()}
          <div className="cd" style={{overflow:"hidden"}}>
            <div style={{padding:"16px 20px 10px",borderBottom:"1px solid var(--border)"}}><h2 style={{fontSize:16,fontWeight:700}}>ランキング</h2></div>
            {rankings.map((r,i)=>{const mx=rankings[0]?.total||1;const dev=deviations[r.member];const mc=getMC(r.member);return(
              <div key={r.member} className="rh" onClick={()=>{setView("member");setSelMem(r.member);}} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",borderBottom:i<rankings.length-1?"1px solid var(--border)":"none",cursor:"pointer",animation:`su .4s ease ${.05+i*.05}s both`}}>
                <div style={{width:28,height:28,borderRadius:14,background:RANK_C[i]+(i<3?"":"40"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:i<3?"#fff":"var(--sub)"}}>{i+1}</div>

                <div className="devbox" style={{width:34,height:34,fontSize:13,background:`linear-gradient(135deg,${devColor(dev)},${devColor(dev)}AA)`,flexShrink:0}}>{dev}</div>
                <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:18,fontWeight:700}}>{r.total.toFixed(1)}</div><div style={{fontSize:11,color:"var(--sub)"}}>{r.count}作品</div></div>
                <div style={{color:"var(--sub)",fontSize:14}}>›</div>
              </div>);})}
          </div>
          <div className="cd" style={{padding:20,marginTop:16}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>🧬 教養タイプ</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {rankings.map((r)=><div key={r.member} style={{padding:14,borderRadius:14,background:"var(--card2)"}}><div style={{fontSize:28,marginBottom:4}}>{r.type.emoji}</div><div style={{fontSize:13,fontWeight:700}}>{fn(r.member)}</div><div style={{fontSize:12,fontWeight:700,color:getMC(r.member)}}>{r.type.name}</div></div>)}
            </div>
          </div>

          {/* Governance Pie Chart */}
          {(() => {
            const totalAll = rankings.reduce((s, r) => s + r.total, 0);
            if (totalAll === 0) return null;
            const pieData = [...rankings].sort((a, b) => b.total - a.total).map((r) => ({
              name: fn(r.member),
              fullName: r.member,
              value: Math.round(r.total * 10) / 10,
              pct: Math.round((r.total / totalAll) * 1000) / 10,
              color: getMC(r.member),
            }));
            const thresholds = [
              { pct: 50, label: "実質支配権", color: "#FF3B30" },
              { pct: 33.4, label: "拒否権", color: "#FF9500" },
              { pct: 10, label: "議案提案権", color: "#007AFF" },
            ];
            return (
              <div className="cd" style={{ padding: 20, marginTop: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <h3 style={{ fontSize: 15, fontWeight: 700 }}>📊 ポイント占有率</h3>
                  <button className="bt" onClick={() => setShowGovInfo(!showGovInfo)} style={{ background: "var(--card2)", padding: "4px 10px", borderRadius: 8, fontSize: 12, color: "var(--sub)" }}>📖 議決権とは</button>
                </div>
                {showGovInfo && (
                  <div style={{ padding: 14, background: dark ? "#2C2C2E" : "#FFF8F0", borderRadius: 12, marginBottom: 16, fontSize: 12, color: "var(--sub)", lineHeight: 1.7, border: "1px solid var(--border)" }}>
                    <div style={{ fontWeight: 700, color: "var(--text)", marginBottom: 6 }}>📖 議決権の閾値（参考）</div>

                    <div><span style={{ color: "#FF9500", fontWeight: 700 }}>●</span> 拒否権: 33.4%超 — 特別決議を単独で否決</div>
                    <div><span style={{ color: "#007AFF", fontWeight: 700 }}>●</span> 議案提案権: 10%以上 — 議案を単独で提案</div>
                    <div style={{ marginTop: 8, fontStyle: "italic", fontSize: 11 }}>※教養ポイントが議決権に直結していた旧ルールの名残です</div>
                  </div>
                )}
                <ResponsiveContainer width="100%" height={220}>
                  <PieChart>
                    <Pie data={pieData} cx="50%" cy="50%" outerRadius={80} innerRadius={35} dataKey="value" startAngle={90} endAngle={-270} paddingAngle={2} strokeWidth={0}
                      label={({ name, pct }) => `${name} ${pct}%`} labelLine={false}>

                      if (!active || !payload?.length) return null;
                      const d = payload[0].payload;

                  </PieChart>
                </ResponsiveContainer>
                {/* Members with governance badges */}
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 12 }}>
                  {pieData.map((d) => {
                    const badges = thresholds.filter((t) => d.pct >= t.pct);
                    return (
                      <div key={d.fullName} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ width: 12, height: 12, borderRadius: 6, background: d.color, display: "inline-block", flexShrink: 0 }} />
                        <span style={{ fontSize: 13, fontWeight: 600, flex: 1 }}>{d.fullName}</span>
                        <span style={{ fontSize: 14, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{d.pct}%</span>
                      </div>
                    );
                  })}
                  {pieData.some((d) => thresholds.some((t) => d.pct >= t.pct)) && (
                    <div style={{ marginTop: 4, display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {pieData.filter((d) => thresholds.some((t) => d.pct >= t.pct)).map((d) => {
                        const highest = thresholds.find((t) => d.pct >= t.pct);
                        return (<span key={d.fullName} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 8, background: highest.color + "18", color: highest.color, fontWeight: 600 }}>{fn(d.fullName)}: {highest.label}</span>);
                      })}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}
        </div>}

        {/* ══ SHELF ══ */}
        {view==="shelf"&&<div>{members.map((m)=>{const me=searched.filter((e)=>e.member===m).sort((a,b)=>(a.date||"").localeCompare(b.date||""));return (<div key={m} className="cd" style={{padding:20,marginBottom:16}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><h3 style={{fontSize:14,fontWeight:700}}>{m}</h3><span style={{fontSize:12,color:"var(--sub)"}}>{me.length}作品</span></div><div className="shelf">{me.map((e,i)=><BookSpine key={e.id} entry={e} idx={i} onClick={()=>setDetE(e)}/>)}{me.length===0&&<div style={{color:"var(--sub)",fontSize:13,padding:20}}>記録なし</div>}</div></div>);})}</div>}

        {/* ══ CHARTS ══ */}
        {view==="charts"&&<div>
          <div className="cd" style={{padding:24,marginBottom:20}}><h2 style={{fontSize:16,fontWeight:700,marginBottom:16}}>ポイント推移</h2>
            <ResponsiveContainer width="100%" height={260}><LineChart data={timeline} margin={{top:8,right:8,left:-16,bottom:0}}><XAxis dataKey="month" tick={{fontSize:10,fill:dark?"#98989D":"#86868B"}} tickLine={false} axisLine={{stroke:"var(--border)"}} interval="preserveStartEnd"/><YAxis tick={{fontSize:11,fill:dark?"#98989D":"#86868B"}} tickLine={false} axisLine={false}/><Tooltip content={<ChartTip/>}/>{members.map((m)=><Line key={m} type="monotone" dataKey={m} stroke={getMC(m)} strokeWidth={2.5} dot={{r:3,fill:dark?"#1C1C1E":"#fff",stroke:getMC(m),strokeWidth:2}} activeDot={{r:5,fill:getMC(m)}}/>)}</LineChart></ResponsiveContainer>
            <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:12,flexWrap:"wrap"}}>{members.map((m)=><div key={m} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--sub)"}}><span style={{width:8,height:8,borderRadius:4,background:getMC(m),display:"inline-block"}}/>{fn(m)}</div>)}</div>
          </div>
          <div className="cd" style={{padding:24}}><h2 style={{fontSize:16,fontWeight:700,marginBottom:16}}>レーダー</h2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{rankings.map((r)=>{const rd=CATEGORIES.map((c)=>({cat:c,value:Math.round(r.byCategory[c]*10)/10}));return (<div key={r.member} style={{textAlign:"center",padding:10,borderRadius:14,background:"var(--card2)"}}><div style={{fontSize:12,fontWeight:700,marginBottom:4}}>{fn(r.member)}</div><ResponsiveContainer width="100%" height={140}><RadarChart data={rd} margin={{top:8,right:16,bottom:8,left:16}}><PolarGrid stroke="var(--border)"/><PolarAngleAxis dataKey="cat" tick={{fontSize:9,fill:"var(--sub)"}}/><Radar dataKey="value" stroke={getMC(r.member)} fill={getMC(r.member)} fillOpacity={.2} strokeWidth={2}/></RadarChart></ResponsiveContainer></div>)})}</div>
          </div>
        </div>}

        {/* ══ ENTRIES ══ */}
        {view==="entries"&&<div className="cd" style={{overflow:"hidden"}}>
          <div style={{padding:"16px 20px 10px",borderBottom:"1px solid var(--border)"}}><h2 style={{fontSize:16,fontWeight:700}}>全記録 — {searched.length}件</h2></div>
          {[...searched].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map((e,i)=>(
            <div key={e.id} className="rh" onClick={()=>setDetE(e)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",borderBottom:"1px solid var(--border)",cursor:"pointer",animation:`su .3s ease ${Math.min(i*.02,.5)}s both`}}>
              <div style={{width:26,height:26,borderRadius:13,background:getMC(e.member)+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:getMC(e.member),flexShrink:0}}>{getMI(e.member)}</div>
              <div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</span><CatPill cat={e.category}/></div><div style={{fontSize:11,color:"var(--sub)"}}>{fn(e.member)} · {e.count}{POINT_RATES[e.category].unit}{e.date?` · ${e.date}`:""}</div></div>
              <div style={{textAlign:"right",flexShrink:0}}><RatingDisplay value={e.rating}/><div style={{fontSize:13,fontWeight:700,color:"#007AFF",marginTop:2}}>+{cp(e.category,e.count).toFixed(1)}</div></div>
            </div>))}
        </div>}

        {/* ══ WISHLIST ══ */}
        {view==="wish"&&<div className="cd" style={{padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:16,fontWeight:700}}>📌 積読リスト</h2><button className="bt" onClick={()=>setShowWishForm(true)} style={{background:"#007AFF",color:"#fff",padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:600}}>+ 追加</button></div>
          {wishlist.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--sub)"}}><div style={{fontSize:32,marginBottom:8}}>📚</div><div>まだ何も登録されていません</div></div>}
          {wishlist.map((w,i)=><div key={w.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<wishlist.length-1?"1px solid var(--border)":"none"}}><CatPill cat={w.category}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{w.title}</div>{w.note&&<div style={{fontSize:11,color:"var(--sub)"}}>{w.note}</div>}</div>
            <button className="bt" onClick={()=>{setForm({member:w.member||members[0],title:w.title,category:w.category,count:1,rating:3,date:new Date().toISOString().split("T")[0],comment:"",recommendation:50,tags:[],spoiler:false,tagInput:""});setEditId(null);setShowForm(true);saveWish(wishlist.filter((x)=>x.id!==w.id));}} style={{background:"#30D158",color:"#fff",padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:600}}>✓ 完了</button>
            <button className="bt" onClick={()=>saveWish(wishlist.filter((x)=>x.id!==w.id))} style={{background:"none",color:"#FF3B30",fontSize:11,fontWeight:600,padding:"5px 8px"}}>削除</button>
          </div>)}
        </div>}

        {/* ══ RECOMMEND ══ */}
        {view==="rec"&&<div>
          <div className="cd" style={{padding:24,marginBottom:16}}>
            <h2 style={{fontSize:16,fontWeight:700,marginBottom:4}}>🎯 おすすめ</h2>
            <p style={{fontSize:11,color:"var(--sub)",marginBottom:16}}>興味プロファイル × 履歴 × 仲間の評価を独自エンジンが分析</p>
            <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>{members.map((m)=><button key={m} className="bt" onClick={()=>{setRecMem(m);setRecs([]);}} style={{padding:"7px 14px",borderRadius:10,fontSize:12,fontWeight:600,background:recMem===m?getMC(m):"var(--card2)",color:recMem===m?"#fff":"var(--text)"}}>{fn(m)}</button>)}</div>

            {recMem&&<>
              {/* Interest profile */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>📋 {fn(recMem)}の興味プロファイル</div>
                <p style={{fontSize:11,color:"var(--sub)",marginBottom:8}}>選択するほど精度UP</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{INTERESTS.map((interest)=>{const sel=(profiles[recMem]?.interests||[]).includes(interest);return (<button key={interest} className="bt" onClick={()=>toggleInterest(recMem,interest)} style={{padding:"5px 12px",borderRadius:16,fontSize:11,fontWeight:600,background:sel?"#007AFF":"var(--card2)",color:sel?"#fff":"var(--sub)"}}>{sel?"✓ ":""}{interest}</button>);})}</div>
              </div>

              {/* Filters */}
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                <div style={{flex:1}}>{lbl("カテゴリ")}<select value={recCatFilter} onChange={(e)=>setRecCatFilter(e.target.value)} style={{width:"100%",fontSize:13}}><option value="all">すべて</option>{CATEGORIES.map((c)=><option key={c} value={c}>{CE[c]} {c}</option>)}</select></div>
                <div style={{flex:1}}>{lbl("言語")}<select value={recLangFilter} onChange={(e)=>setRecLangFilter(e.target.value)} style={{width:"100%",fontSize:13}}><option value="all">すべて</option>{LANGUAGES.map((l)=><option key={l} value={l}>{l}</option>)}</select></div>
              </div>

              <button className="bt" onClick={generateRecs} style={{background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",padding:"14px",borderRadius:14,fontSize:15,fontWeight:700,width:"100%",boxShadow:"0 4px 16px rgba(0,122,255,.3)"}}>🎯 おすすめを生成</button>
            </>}
          </div>

          {recs.length>0&&<div className="cd" style={{padding:20}}>
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>{fn(recMem)}さんへのおすすめ</h3>
            {recs.map((rec,i)=>{const seen=entries.some((e)=>e.title===rec.title);const inW=wishlist.some((w)=>w.title===rec.title);return(
              <div key={i} style={{padding:14,background:"var(--card2)",borderRadius:14,marginBottom:10,animation:`su .3s ease ${i*.08}s both`}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <div style={{fontSize:24,lineHeight:1}}>{CE[rec.category]}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:700}}>{rec.title}</span>
                      <CatPill cat={rec.category}/>
                      {rec.match==="high"&&<span style={{fontSize:10,padding:"2px 6px",borderRadius:6,background:"#34C75920",color:"#34C759",fontWeight:600}}>高相性</span>}
                      <span style={{fontSize:10,color:"var(--sub)"}}>{rec.lang}</span>
                    </div>
                    <div style={{fontSize:12,color:"var(--sub)",marginBottom:4}}>{rec.reason}</div>
                    <TagChips tags={rec.tags}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:6,marginTop:10}}>
                  {seen?<span style={{fontSize:11,color:"var(--sub)",fontWeight:600,padding:"5px 10px"}}>✓ 記録済み</span>:<button className="bt" onClick={()=>{setForm({member:recMem,title:rec.title,category:rec.category,count:rec.count||1,rating:3,date:new Date().toISOString().split("T")[0],comment:"",recommendation:50,tags:rec.tags||[],spoiler:false,tagInput:""});setEditId(null);setShowForm(true);}} style={{background:"#30D158",color:"#fff",padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:600}}>✓ 見た！記録する</button>}
                  {!inW&&!seen&&<button className="bt" onClick={()=>saveWish([...wishlist,{id:Date.now().toString(),title:rec.title,category:rec.category,member:recMem,note:rec.reason}])} style={{background:"#FF9500",color:"#fff",padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:600}}>📌 気になる</button>}
                  {inW&&<span style={{fontSize:11,color:"#FF9500",fontWeight:600,padding:"5px 10px"}}>📌 積読中</span>}
                  <button className="bt" onClick={()=>{setDismissed([...dismissed,rec.title]);setRecs(recs.filter((r)=>r.title!==rec.title));}} style={{background:"none",color:"var(--sub)",fontSize:11,padding:"5px 6px"}}>✕</button>
                </div>
              </div>);})}
            <button className="bt" onClick={generateRecs} style={{marginTop:8,background:"var(--card2)",color:"#007AFF",padding:"10px",borderRadius:10,fontSize:12,fontWeight:600,width:"100%"}}>🔄 別のおすすめ</button>
          </div>}
        </div>}

        {/* ══ MEMBER ══ */}
        {view==="member"&&selMem&&detail&&<div>
          <div className="cd" style={{padding:24,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
              <div style={{textAlign:"center"}}><div className="devbox" style={{width:48,height:48,fontSize:18,background:`linear-gradient(135deg,${devColor(deviations[selMem])},${devColor(deviations[selMem])}AA)`,marginBottom:4}}>{deviations[selMem]}</div><div style={{fontSize:9,color:"var(--sub)"}}>偏差値</div></div>
              <div style={{flex:1}}><h2 style={{fontSize:20,fontWeight:700}}>{selMem}</h2><div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"#FFD70020",color:"#B8860B",fontWeight:600}}>{detail.title.emoji} {detail.title.name}</span><span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"#007AFF15",color:"#007AFF",fontWeight:600}}>{detail.type.emoji} {detail.type.name}</span></div><div style={{fontSize:12,color:"var(--sub)",marginTop:4}}>{detail.count}作品 · 平均 {detail.avgR.toFixed(1)}★</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:30,fontWeight:800,color:getMC(selMem)}}>{detail.total.toFixed(1)}</div><div style={{fontSize:11,color:"var(--sub)"}}>pt</div></div>
            </div>
            {detail.title.next&&<div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--sub)",marginBottom:4}}><span>次: {detail.title.next.emoji} {detail.title.next.name}</span><span>あと {(detail.title.next.min-detail.total).toFixed(1)}pt</span></div><div className="pb"><div className="pf" style={{width:`${detail.title.progress*100}%`,background:"linear-gradient(90deg,#FFD700,#FF9500)"}}/></div></div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>{CATEGORIES.filter((c)=>detail.byCategory[c]>0).map((cat)=><div key={cat} style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:36,fontSize:11,fontWeight:600,color:CC[cat]}}>{cat}</div><div className="pb" style={{flex:1}}><div className="pf" style={{width:`${(detail.byCategory[cat]/detail.total)*100}%`,background:CC[cat]}}/></div><div style={{width:48,textAlign:"right",fontSize:12,fontWeight:600}}>{detail.byCategory[cat].toFixed(1)}</div></div>)}</div>
          </div>
          <div className="cd" style={{padding:20,marginBottom:16}}><h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>本棚</h3><div className="shelf">{detail.entries.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map((e,i)=><BookSpine key={e.id} entry={e} idx={i} onClick={()=>setDetE(e)}/>)}</div></div>
          <div className="cd" style={{overflow:"hidden"}}><div style={{padding:"16px 20px 10px",borderBottom:"1px solid var(--border)"}}><h3 style={{fontSize:14,fontWeight:700}}>記録一覧</h3></div>
            {detail.entries.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map((e)=>(
              <div key={e.id} className="rh" style={{padding:"12px 20px",borderBottom:"1px solid var(--border)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}><span style={{fontSize:14,fontWeight:600,flex:1,cursor:"pointer"}} onClick={()=>setDetE(e)}>{e.title}</span><CatPill cat={e.category}/><span style={{fontSize:14,fontWeight:700,color:getMC(selMem)}}>+{cp(e.category,e.count).toFixed(1)}</span></div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><RatingDisplay value={e.rating}/><div style={{display:"flex",gap:6}}><button className="bt" onClick={()=>{setForm({...e,tagInput:""});setEditId(e.id);setShowForm(true);}} style={{background:"none",color:"#007AFF",fontSize:11,fontWeight:600,padding:"5px 8px",borderRadius:8}}>編集</button><button className="bt" onClick={()=>save(entries.filter((x)=>x.id!==e.id))} style={{background:"none",color:"#FF3B30",fontSize:11,fontWeight:600,padding:"5px 8px",borderRadius:8}}>削除</button></div></div>
                <TagChips tags={e.tags}/>
                {e.comment&&<div style={{fontSize:12,color:"var(--sub)",marginTop:6,padding:"6px 10px",background:"var(--card2)",borderRadius:10,fontStyle:"italic"}}>{e.spoiler?<details><summary style={{cursor:"pointer",color:"#FF3B30",fontWeight:600,fontStyle:"normal"}}>⚠ ネタバレ</summary><div style={{marginTop:4}}>💬 {e.comment}</div></details>:<>💬 {e.comment}</>}</div>}
              </div>))}
          </div>
        </div>}
      </div>

      {/* FAB */}
      <button className="bt" onClick={()=>{setEditId(null);setForm({member:selMem||members[0],title:"",category:"映画",count:1,rating:3,date:new Date().toISOString().split("T")[0],comment:"",recommendation:50,tags:[],spoiler:false,tagInput:""});setShowForm(true);}} style={{position:"fixed",bottom:28,right:28,width:56,height:56,borderRadius:28,background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",fontSize:28,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(0,122,255,.4)",zIndex:50}}>+</button>

      {/* Detail Modal */}
      {detE&&<><div className="bk" onClick={()=>setDetE(null)}/><div className="ml">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}><div style={{flex:1}}><CatPill cat={detE.category}/><h3 style={{fontSize:20,fontWeight:700,marginTop:8}}>{detE.title}</h3><div style={{fontSize:12,color:"var(--sub)",marginTop:4}}>{detE.member} · {detE.date||"日付未設定"}</div></div>{closeBtn(()=>setDetE(null))}</div>
        <div style={{display:"flex",gap:16,marginBottom:16,flexWrap:"wrap"}}><div><div style={{fontSize:11,color:"var(--sub)",marginBottom:4}}>評価</div><RatingDisplay value={detE.rating}/></div><div><div style={{fontSize:11,color:"var(--sub)",marginBottom:4}}>教養pt</div><div style={{fontSize:22,fontWeight:800,color:"#007AFF"}}>{cp(detE.category,detE.count).toFixed(1)}</div></div><div><div style={{fontSize:11,color:"var(--sub)",marginBottom:4}}>推奨度</div><div style={{fontSize:16,fontWeight:700,color:rc(detE.recommendation||0)}}>{detE.recommendation||0}% {rl(detE.recommendation||0)}</div></div></div>
        <TagChips tags={detE.tags}/>
        {detE.comment&&<div style={{padding:12,background:"var(--card2)",borderRadius:12,fontSize:13,lineHeight:1.7,marginTop:12,marginBottom:16}}>{detE.spoiler?<details><summary style={{cursor:"pointer",color:"#FF3B30",fontWeight:600}}>⚠ ネタバレ</summary><div style={{marginTop:8}}>{detE.comment}</div></details>:detE.comment}</div>}
        <a href={`https://www.amazon.co.jp/s?k=${encodeURIComponent(detE.title)}`} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:12,background:"var(--card2)",borderRadius:12,color:"#FF9500",fontWeight:700,fontSize:13,textDecoration:"none",marginTop:12}}>🔗 Amazonで探す</a>
      </div></>}

      {/* Form Modal */}
      {showForm&&<><div className="bk" onClick={()=>{setShowForm(false);setEditId(null);}}/><div className="ml">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}><h3 style={{fontSize:18,fontWeight:700}}>{editId?"記録を編集":"新しい記録"}</h3>{closeBtn(()=>{setShowForm(false);setEditId(null);})}</div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>{lbl("メンバー")}<select value={form.member} onChange={(e)=>setForm({...form,member:e.target.value})} style={{width:"100%"}}>{members.map((m)=><option key={m} value={m}>{m}</option>)}</select></div>
          <div>{lbl("作品名")}<input value={form.title} onChange={(e)=>setForm({...form,title:e.target.value})} placeholder="タイトル" style={{width:"100%"}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div>{lbl("カテゴリ")}<select value={form.category} onChange={(e)=>setForm({...form,category:e.target.value,count:e.target.value==="映画"?1:form.count})} style={{width:"100%"}}>{CATEGORIES.map((c)=><option key={c} value={c}>{c}</option>)}</select></div><div>{lbl(POINT_RATES[form.category].unit+"数")}<input type="number" min="1" value={form.count} onChange={(e)=>setForm({...form,count:parseInt(e.target.value)||1})} style={{width:"100%"}}/></div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,alignItems:"end"}}><div>{lbl("評価（0〜5）")}<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#FF9500"}}>{"★".repeat(Math.round(form.rating))}{"☆".repeat(5-Math.round(form.rating))}</span><span style={{fontWeight:700,color:"#FF9500"}}>{(form.rating||0).toFixed(1)}</span></div><input type="range" min="0" max="50" value={Math.round((form.rating||0)*10)} onChange={(e)=>setForm({...form,rating:parseInt(e.target.value)/10})} className="rslider"/></div><div>{lbl("完了日")}<input type="date" value={form.date} onChange={(e)=>setForm({...form,date:e.target.value})} style={{width:"100%"}}/></div></div>
          <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",marginBottom:6,display:"flex",justifyContent:"space-between"}}><span>おすすめ度</span><span style={{color:rc(form.recommendation),fontWeight:700}}>{form.recommendation}% {rl(form.recommendation)}</span></label><input type="range" min="0" max="100" value={form.recommendation} onChange={(e)=>setForm({...form,recommendation:parseInt(e.target.value)})} className="rcslider"/></div>
          <div>{lbl("タグ")}<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>{form.tags.map((t)=><span key={t} style={{fontSize:11,padding:"3px 10px",borderRadius:10,background:"#007AFF18",color:"#007AFF",fontWeight:600,display:"flex",alignItems:"center",gap:4}}>#{t}<button onClick={()=>setForm({...form,tags:form.tags.filter((x)=>x!==t)})} style={{background:"none",border:"none",color:"#007AFF",cursor:"pointer",fontSize:13,padding:0}}>×</button></span>)}</div><input value={form.tagInput||""} onChange={(e)=>setForm({...form,tagInput:e.target.value})} onKeyDown={(e)=>{if(e.key==="Enter"||e.key===","){e.preventDefault();addTag(form.tagInput);}}} placeholder="タグ入力（Enter追加）" style={{width:"100%"}}/></div>
          <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><label style={{fontSize:13,fontWeight:600,color:"var(--sub)"}}>感想</label><label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:form.spoiler?"#FF3B30":"var(--sub)",cursor:"pointer"}}><input type="checkbox" checked={form.spoiler} onChange={(e)=>setForm({...form,spoiler:e.target.checked})} style={{width:14,height:14,accentColor:"#FF3B30"}}/>⚠ ネタバレ</label></div><textarea value={form.comment} onChange={(e)=>setForm({...form,comment:e.target.value})} placeholder="感想..." rows={3} style={{width:"100%",resize:"vertical"}}/></div>
          <div style={{background:"var(--card2)",borderRadius:12,padding:12,textAlign:"center"}}><span style={{fontSize:12,color:"var(--sub)"}}>獲得: </span><span style={{fontSize:20,fontWeight:800,color:"#007AFF"}}>{cp(form.category,form.count).toFixed(1)}</span><span style={{fontSize:12,color:"var(--sub)"}}> pt</span></div>
          <button className="bt" onClick={handleSubmit} style={{background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",padding:14,borderRadius:14,fontSize:16,fontWeight:700,width:"100%"}}>{editId?"更新":"📚 記録する"}</button>
        </div>
      </div></>}

      {/* Wish Form */}
      {showWishForm&&<><div className="bk" onClick={()=>setShowWishForm(false)}/><div className="ml">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}><h3 style={{fontSize:18,fontWeight:700}}>📌 積読に追加</h3>{closeBtn(()=>setShowWishForm(false))}</div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>{lbl("タイトル")}<input value={wishForm.title} onChange={(e)=>setWishForm({...wishForm,title:e.target.value})} placeholder="読みたい本・観たい映画" style={{width:"100%"}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div>{lbl("カテゴリ")}<select value={wishForm.category} onChange={(e)=>setWishForm({...wishForm,category:e.target.value})} style={{width:"100%"}}>{CATEGORIES.map((c)=><option key={c} value={c}>{c}</option>)}</select></div><div>{lbl("メンバー")}<select value={wishForm.member||members[0]} onChange={(e)=>setWishForm({...wishForm,member:e.target.value})} style={{width:"100%"}}>{members.map((m)=><option key={m} value={m}>{m}</option>)}</select></div></div>
          <button className="bt" onClick={()=>{if(!wishForm.title.trim())return;saveWish([...wishlist,{...wishForm,member:wishForm.member||members[0],id:Date.now().toString()}]);setWishForm({title:"",category:"映画",member:members[0],note:""});setShowWishForm(false);}} style={{background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",padding:14,borderRadius:14,fontSize:16,fontWeight:700,width:"100%"}}>📌 追加</button>
        </div>
      </div></>}

      {/* Settings Modal */}
      {showSettings&&<><div className="bk" onClick={()=>setShowSettings(false)}/><div className="ml">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}><h3 style={{fontSize:18,fontWeight:700}}>⚙️ 設定</h3>{closeBtn(()=>setShowSettings(false))}</div>
        <div style={{display:"flex",flexDirection:"column",gap:20}}>
          {/* App Name */}
          <div>
            {lbl("アプリ名")}
            <input value={config.appName} onChange={(e)=>saveConfig({...config,appName:e.target.value})} style={{width:"100%"}} />
          </div>

          {/* Members */}
          <div>
            {lbl("メンバー管理")}
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
              {members.map((m,i)=>(
                <div key={m} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"var(--card2)",borderRadius:12}}>
                  <div style={{width:24,height:24,borderRadius:12,background:PALETTE[i%PALETTE.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{getMI(m)}</div>
                  <span style={{flex:1,fontSize:14,fontWeight:600}}>{m}</span>
                  <button className="bt" onClick={()=>removeMember(m)} style={{background:"none",color:"#FF3B30",fontSize:12,fontWeight:600,padding:"4px 8px"}}>削除</button>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={newMember} onChange={(e)=>setNewMember(e.target.value)} onKeyDown={(e)=>{if(e.key==="Enter"){addMember();}}} placeholder="新しいメンバー名" style={{flex:1}} />
              <button className="bt" onClick={addMember} style={{background:"#007AFF",color:"#fff",padding:"8px 16px",borderRadius:10,fontSize:13,fontWeight:600}}>追加</button>
            </div>
          </div>

          {/* Scoring Rules */}
          <div>
            {lbl("配点ルール")}
            {CATEGORIES.map((cat)=>(
              <div key={cat} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                <span style={{fontSize:18}}>{CE[cat]}</span>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{cat}</div></div>
                <div style={{background:CC[cat]+"18",padding:"4px 12px",borderRadius:8,fontWeight:700,fontSize:13,color:CC[cat]}}>{POINT_RATES[cat].label}</div>
              </div>
            ))}
            <div style={{marginTop:12,padding:14,background:"var(--card2)",borderRadius:12,fontSize:11,color:"var(--sub)",lineHeight:1.6}}>
              <strong>称号:</strong> {TITLES.map((t)=>`${t.emoji}${t.name}(${t.min}pt)`).join(" → ")}
            </div>
          </div>

          {/* Data info */}
          <div style={{padding:14,background:"var(--card2)",borderRadius:12,fontSize:12,color:"var(--sub)"}}>
            <div>記録数: {entries.length}件 · 積読: {wishlist.length}件 · メンバー: {members.length}人</div>
            <div style={{marginTop:4}}>ストレージキー: kyouyou-v7, kyouyou-config-v1</div>
            <div style={{marginTop:4}}>このアプリを複製するには、共有リンクをコピーして別の環境で開いてください。設定で別のメンバー・アプリ名に変更すれば、別コミュニティとして運用できます。</div>
          </div>
        </div>
      </div></>}
    </div>
  );
}


const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
