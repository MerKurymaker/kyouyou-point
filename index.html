/* Helpers */
function cp(cat,cnt){return Math.round(cnt*POINT_RATES[cat].rate*100)/100}
function fnm(m){return m.split(" ")[0]}
function getTitle(pts){var t=TITLES[0];for(var i=0;i<TITLES.length;i++){if(pts>=TITLES[i].min)t=TITLES[i];}var nx=null;for(var j=0;j<TITLES.length;j++){if(TITLES[j].min>pts){nx=TITLES[j];break;}}return{name:t.name,emoji:t.emoji,next:nx,progress:nx?(pts-t.min)/(nx.min-t.min):1};}
function getMC(m,members){var idx=members.indexOf(m);return PALETTE[idx%PALETTE.length]}
function getMI(m){return m?m.charAt(0):"?"}
function recommend(member,entries,interests,wishlist,dismissed,filterCat,filterLang){
  var me=entries.filter(function(e){return e.member===member});
  var allT={};entries.forEach(function(e){allT[e.title]=true});
  var wishT={};(wishlist||[]).forEach(function(w){wishT[w.title]=true});
  var dSet={};(dismissed||[]).forEach(function(d){dSet[d]=true});
  var myTags={};
  me.forEach(function(e){(e.tags||[]).forEach(function(t){myTags[t]=(myTags[t]||0)+(e.rating>=4?3:e.rating>=3?1:0);});});
  (interests||[]).forEach(function(i){myTags[i]=(myTags[i]||0)+5;});
  var othersHigh={};
  entries.filter(function(e){return e.member!==member&&e.rating>=4&&e.recommendation>=60}).forEach(function(e){othersHigh[e.title]=(othersHigh[e.title]||0)+1;});
  var catCount={};me.forEach(function(e){catCount[e.category]=(catCount[e.category]||0)+1;});
  var totalCat=0;Object.keys(catCount).forEach(function(k){totalCat+=catCount[k];});totalCat=totalCat||1;
  var pool=CATALOG.filter(function(c){return !allT[c.title]&&!wishT[c.title]&&!dSet[c.title]});
  if(filterCat&&filterCat!=="all")pool=pool.filter(function(c){return c.category===filterCat});
  if(filterLang&&filterLang!=="all")pool=pool.filter(function(c){return c.lang===filterLang});
  return pool.map(function(item){
    var score=0;var reasons=[];
    var tagMatch=(item.tags||[]).filter(function(t){return myTags[t]>0;});
    tagMatch.forEach(function(t){score+=myTags[t];});
    if(tagMatch.length>=2)reasons.push(tagMatch.slice(0,2).join("・")+"好きにぴったり");
    if(othersHigh[item.title]){score+=othersHigh[item.title]*5;reasons.push("仲間が高評価");}
    var catRatio=(catCount[item.category]||0)/totalCat;
    if(catRatio<0.1){score+=8;reasons.push(item.category+"の新たな冒険");}
    var iMatch=(item.tags||[]).filter(function(t){return(interests||[]).indexOf(t)>=0;});
    if(iMatch.length>0&&reasons.length===0)reasons.push(iMatch[0]+"に興味あり");
    return{title:item.title,category:item.category,tags:item.tags,lang:item.lang,count:item.count,score:score,reason:reasons[0]||item.category+"の名作",match:score>=15?"high":score>=8?"medium":"low"};
  }).sort(function(a,b){return b.score-a.score}).slice(0,6);
}

/* CSS Pie Chart */
function PieChart(props) {
  var data = props.data; var size = props.size || 160;
  var total = 0; data.forEach(function(d){total += d.value;});
  if (total === 0) return <div style={{width:size,height:size,borderRadius:"50%",background:"var(--bb)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--sub)",fontSize:12}}>–</div>;
  var segments = []; var acc = 0;
  data.forEach(function(d) {
    var pct = (d.value / total) * 100;
    segments.push(d.color + " " + acc + "% " + (acc + pct) + "%");
    acc += pct;
  });
  return <div style={{width:size,height:size,borderRadius:"50%",background:"conic-gradient("+segments.join(",")+")",margin:"0 auto"}} />;
}

      <style>{css}</style>

      {/* Header */}
      <div style={{background:dark?"linear-gradient(135deg,#000,#1C1C1E)":"linear-gradient(135deg,#1C1C1E,#2C2C2E)",padding:"48px 24px 28px",color:"#fff"}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:40,height:40,borderRadius:10,background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📚</div>
              <h1 style={{fontSize:22,fontWeight:700}}>{appName}</h1>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={function(){setDark(!dark)}} style={{background:"rgba(255,255,255,.12)",color:"#fff",padding:"8px 10px",borderRadius:10,fontSize:12,border:"none",cursor:"pointer"}}>{dark?"☀️":"🌙"}</button>
              <button onClick={function(){setShowSettings(true)}} style={{background:"rgba(255,255,255,.1)",color:"#fff",padding:"8px 10px",borderRadius:10,fontSize:12,border:"none",cursor:"pointer"}}>⚙️</button>
              <button onClick={handleReset} style={{background:"rgba(255,255,255,.06)",color:"#8E8E93",padding:"8px 10px",borderRadius:10,fontSize:11,border:"none",cursor:"pointer"}}>リセット</button>
            </div>
          </div>
          <div style={{display:"flex",gap:4,marginTop:12,background:"rgba(255,255,255,.08)",padding:4,borderRadius:12,overflowX:"auto"}}>
            {TABS.map(function(t){return <button key={t.k} onClick={function(){setView(t.k);setSelMem(null)}} style={{padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:view===t.k?"#007AFF":"transparent",color:view===t.k?"#fff":"rgba(255,255,255,.5)",whiteSpace:"nowrap"}}>{t.l}</button>})}
            {members.map(function(m){return <button key={m} onClick={function(){setView("member");setSelMem(m)}} style={{padding:"7px 10px",borderRadius:8,fontSize:11,fontWeight:600,border:"none",cursor:"pointer",background:view==="member"&&selMem===m?"#007AFF":"transparent",color:view==="member"&&selMem===m?"#fff":"rgba(255,255,255,.5)",whiteSpace:"nowrap"}}>{fnm(m)}</button>})}
          </div>
        </div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"24px 16px"}}>

        {/* DASHBOARD */}
        {view==="dashboard" && <div>
          {rankings.length>0 && rankings[0].total>0 && (function(){var r=rankings[0];var tt=r.title;return (
            <div style={{background:"var(--card)",borderRadius:16,padding:24,marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <div style={{fontSize:36}}>👑</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"var(--sub)",fontWeight:600}}>現在1位</div>
                  <div style={{fontSize:22,fontWeight:700}}>{r.member}</div>
                  <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"#FFD70020",color:"#B8860B",fontWeight:600}}>{tt.emoji} {tt.name}</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:36,fontWeight:800,color:"#FF9500"}}>{r.total.toFixed(1)}</div>
                  <div style={{fontSize:12,color:"var(--sub)"}}>pts</div>
                </div>
              </div>
              {tt.next && <div style={{marginTop:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--sub)",marginBottom:4}}>
                  <span>{tt.emoji} {tt.name}</span>
                  <span>次: {tt.next.emoji} {tt.next.name} ({tt.next.min}pt)</span>
                </div>
                <div style={{height:6,borderRadius:3,background:"var(--bb)",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:3,width:(tt.progress*100)+"%",background:"linear-gradient(90deg,#FFD700,#FF9500)",transition:"width .8s"}} />
                </div>
              </div>}
            </div>
          )})()}

          {/* Rankings */}
          <div style={{background:"var(--card)",borderRadius:16,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
            <div style={{padding:"16px 20px 10px",borderBottom:"1px solid var(--border)"}}><h2 style={{fontSize:16,fontWeight:700}}>ランキング</h2></div>
            {rankings.map(function(r,i){var mx=rankings[0].total||1;var mc=getMC(r.member,members);return (
              <div key={r.member} onClick={function(){setView("member");setSelMem(r.member)}} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",borderBottom:i<rankings.length-1?"1px solid var(--border)":"none",cursor:"pointer"}}>
                <div style={{width:28,height:28,borderRadius:14,background:RANK_C[i],display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:i<3?"#fff":"var(--sub)"}}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <span style={{fontSize:14,fontWeight:600}}>{r.member}</span>
                    <span style={{fontSize:10,padding:"1px 6px",borderRadius:6,background:"#FFD70018",color:"#B8860B",fontWeight:600}}>{r.title.emoji} {r.title.name}</span>
                  </div>
                  <div style={{height:6,borderRadius:3,background:"var(--bb)",overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:3,width:(r.total/mx*100)+"%",background:mc,transition:"width .8s"}} />
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:18,fontWeight:700}}>{r.total.toFixed(1)}</div>
                  <div style={{fontSize:11,color:"var(--sub)"}}>{r.count}作品</div>
                </div>
                <div style={{color:"var(--sub)",fontSize:14}}>›</div>
              </div>
            )})}
          </div>

          {/* Pie */}
          {(function(){
            var totalAll=rankings.reduce(function(s,r){return s+r.total},0);
            if(totalAll===0)return null;
            var pieData=rankings.map(function(r){return{name:fnm(r.member),full:r.member,value:r.total,pct:Math.round(r.total/totalAll*1000)/10,color:getMC(r.member,members)}});
            return <div style={{background:"var(--card)",borderRadius:16,padding:20,marginTop:16,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <h3 style={{fontSize:15,fontWeight:700}}>📊 ポイント占有率</h3>
                <button onClick={function(){setShowGovInfo(!showGovInfo)}} style={{background:"var(--card2)",padding:"4px 10px",borderRadius:8,fontSize:12,color:"var(--sub)",border:"none",cursor:"pointer"}}>📖 議決権</button>
              </div>
              {showGovInfo && <div style={{padding:12,background:"var(--card2)",borderRadius:12,marginBottom:16,fontSize:12,color:"var(--sub)",lineHeight:1.7}}>
                <div style={{fontWeight:700,color:"var(--text)",marginBottom:4}}>📖 議決権の閾値</div>
                <div><span style={{color:"#FF3B30",fontWeight:700}}>●</span> 実質支配権: 50%超</div>
                <div><span style={{color:"#FF9500",fontWeight:700}}>●</span> 拒否権: 33.4%超</div>
                <div><span style={{color:"#007AFF",fontWeight:700}}>●</span> 議案提案権: 10%以上</div>
              </div>}
              <PieChart data={pieData} size={160} />
              <div style={{marginTop:12}}>
                {pieData.map(function(d){
                  var badge=d.pct>50?"実質支配権":d.pct>33.4?"拒否権":d.pct>=10?"議案提案権":null;
                  var badgeColor=d.pct>50?"#FF3B30":d.pct>33.4?"#FF9500":"#007AFF";
                  return <div key={d.full} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0"}}>
                    <span style={{width:12,height:12,borderRadius:6,background:d.color,flexShrink:0}} />
                    <span style={{fontSize:13,fontWeight:600,flex:1}}>{d.full}</span>
                    <span style={{fontSize:14,fontWeight:700}}>{d.pct}%</span>
                    {badge && <span style={{fontSize:10,padding:"2px 8px",borderRadius:6,background:badgeColor+"18",color:badgeColor,fontWeight:600}}>{badge}</span>}
                  </div>
                })}
              </div>
            </div>;
          })()}
        </div>}

        {/* ENTRIES */}
        {view==="entries" && <div style={{background:"var(--card)",borderRadius:16,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
          <div style={{padding:"16px 20px 10px",borderBottom:"1px solid var(--border)"}}><h2 style={{fontSize:16,fontWeight:700}}>全記録 — {entries.length}件</h2></div>
          {entries.slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"")}).map(function(e){return (
            <div key={e.id} onClick={function(){setDetE(e)}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",borderBottom:"1px solid var(--border)",cursor:"pointer"}}>
              <div style={{width:26,height:26,borderRadius:13,background:getMC(e.member,members)+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:getMC(e.member,members),flexShrink:0}}>{getMI(e.member)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                  <span style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</span>
                  <span style={{fontSize:10,padding:"1px 8px",borderRadius:10,background:CC[e.category]+"22",color:CC[e.category],fontWeight:600}}>{e.category}</span>
                </div>
                <div style={{fontSize:11,color:"var(--sub)"}}>{fnm(e.member)} · {e.date||""}</div>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:"#007AFF",flexShrink:0}}>+{cp(e.category,e.count).toFixed(1)}</div>
            </div>
          )})}
        </div>}

        {/* WISHLIST */}
        {view==="wish" && <div style={{background:"var(--card)",borderRadius:16,padding:20,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h2 style={{fontSize:16,fontWeight:700}}>📌 積読リスト</h2>
            <button onClick={function(){setShowWishForm(true)}} style={{background:"#007AFF",color:"#fff",padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:600,border:"none",cursor:"pointer"}}>+ 追加</button>
          </div>
          {wishlist.length===0 && <div style={{textAlign:"center",padding:40,color:"var(--sub)"}}><div style={{fontSize:32,marginBottom:8}}>📚</div><div>まだありません</div></div>}
          {wishlist.map(function(w,i){return (
            <div key={w.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<wishlist.length-1?"1px solid var(--border)":"none"}}>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:CC[w.category]+"22",color:CC[w.category],fontWeight:600}}>{w.category}</span>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{w.title}</div></div>
              <button onClick={function(){setForm({member:w.member||members[0],title:w.title,category:w.category,count:1,rating:3,date:new Date().toISOString().split("T")[0],comment:"",recommendation:50,tags:[],spoiler:false,tagInput:""});setEditId(null);setShowForm(true);saveWish(wishlist.filter(function(x){return x.id!==w.id}));}} style={{background:"#30D158",color:"#fff",padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:600,border:"none",cursor:"pointer"}}>✓完了</button>
              <button onClick={function(){saveWish(wishlist.filter(function(x){return x.id!==w.id}))}} style={{background:"none",color:"#FF3B30",fontSize:11,fontWeight:600,padding:"5px 8px",border:"none",cursor:"pointer"}}>削除</button>
            </div>
          )})}
        </div>}

        {/* RECOMMEND */}
        {view==="rec" && <div>
          <div style={{background:"var(--card)",borderRadius:16,padding:24,marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
            <h2 style={{fontSize:16,fontWeight:700,marginBottom:4}}>🎯 おすすめ</h2>
            <p style={{fontSize:11,color:"var(--sub)",marginBottom:16}}>興味プロファイル × 履歴 × 仲間の評価を分析</p>
            <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
              {members.map(function(m){return <button key={m} onClick={function(){setRecMem(m);setRecs([])}} style={{padding:"7px 14px",borderRadius:10,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:recMem===m?getMC(m,members):"var(--card2)",color:recMem===m?"#fff":"var(--text)"}}>{fnm(m)}</button>})}
            </div>
            {recMem && <div>
              <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>📋 {fnm(recMem)}の興味</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:16}}>
                {INTERESTS.map(function(interest){var sel=(profiles[recMem]&&profiles[recMem].interests||[]).indexOf(interest)>=0;return <button key={interest} onClick={function(){toggleInterest(recMem,interest)}} style={{padding:"5px 12px",borderRadius:16,fontSize:11,fontWeight:600,border:"none",cursor:"pointer",background:sel?"#007AFF":"var(--card2)",color:sel?"#fff":"var(--sub)"}}>{sel?"✓ ":""}{interest}</button>})}
              </div>
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                <select value={recCatFilter} onChange={function(e){setRecCatFilter(e.target.value)}} style={{flex:1,fontSize:13}}><option value="all">カテゴリ: すべて</option>{CATEGORIES.map(function(c){return <option key={c} value={c}>{c}</option>})}</select>
                <select value={recLangFilter} onChange={function(e){setRecLangFilter(e.target.value)}} style={{flex:1,fontSize:13}}><option value="all">言語: すべて</option><option value="日本語">日本語</option><option value="英語">英語</option><option value="韓国語">韓国語</option></select>
              </div>
              <button onClick={generateRecs} style={{background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",padding:14,borderRadius:14,fontSize:15,fontWeight:700,width:"100%",border:"none",cursor:"pointer"}}>🎯 おすすめを生成</button>
            </div>}
          </div>
          {recs.length>0 && <div style={{background:"var(--card)",borderRadius:16,padding:20,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
            {recs.map(function(rec,i){var seen=entries.some(function(e){return e.title===rec.title});var inW=wishlist.some(function(w){return w.title===rec.title});return (
              <div key={i} style={{padding:14,background:"var(--card2)",borderRadius:14,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <div style={{fontSize:24}}>{CE[rec.category]}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:700}}>{rec.title}</span>
                      {rec.match==="high" && <span style={{fontSize:10,padding:"2px 6px",borderRadius:6,background:"#34C75920",color:"#34C759",fontWeight:600}}>高相性</span>}
                      <span style={{fontSize:10,color:"var(--sub)"}}>{rec.lang}</span>
                    </div>
                    <div style={{fontSize:12,color:"var(--sub)"}}>{rec.reason}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:6,marginTop:10}}>
                  {seen ? <span style={{fontSize:11,color:"var(--sub)",padding:"5px 10px"}}>✓ 記録済み</span> :
                    <button onClick={function(){setForm({member:recMem,title:rec.title,category:rec.category,count:rec.count||1,rating:3,date:new Date().toISOString().split("T")[0],comment:"",recommendation:50,tags:rec.tags||[],spoiler:false,tagInput:""});setEditId(null);setShowForm(true)}} style={{background:"#30D158",color:"#fff",padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:600,border:"none",cursor:"pointer"}}>✓ 見た！</button>}
                  {!inW&&!seen && <button onClick={function(){saveWish(wishlist.concat([{id:Date.now().toString(),title:rec.title,category:rec.category,member:recMem,note:rec.reason}]))}} style={{background:"#FF9500",color:"#fff",padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:600,border:"none",cursor:"pointer"}}>📌 気になる</button>}
                  {inW && <span style={{fontSize:11,color:"#FF9500",padding:"5px 10px"}}>📌 積読中</span>}
                  <button onClick={function(){setDismissed(dismissed.concat([rec.title]));setRecs(recs.filter(function(r){return r.title!==rec.title}))}} style={{background:"none",color:"var(--sub)",fontSize:11,padding:"5px 6px",border:"none",cursor:"pointer"}}>✕</button>
                </div>
              </div>
            )})}
          </div>}
        </div>}

        {/* MEMBER */}
        {view==="member" && selMem && detail && <div>
          <div style={{background:"var(--card)",borderRadius:16,padding:24,marginBottom:16,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
              <div style={{flex:1}}>
                <h2 style={{fontSize:20,fontWeight:700}}>{selMem}</h2>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:8,background:"#FFD70020",color:"#B8860B",fontWeight:600}}>{detail.title.emoji} {detail.title.name}</span>
                <div style={{fontSize:12,color:"var(--sub)",marginTop:4}}>{detail.count}作品 · 平均 {detail.avgR.toFixed(1)}★</div>
              </div>
              <div style={{textAlign:"right"}}><div style={{fontSize:30,fontWeight:800,color:getMC(selMem,members)}}>{detail.total.toFixed(1)}</div><div style={{fontSize:11,color:"var(--sub)"}}>pt</div></div>
            </div>
            {detail.title.next && <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--sub)",marginBottom:4}}><span>次: {detail.title.next.emoji} {detail.title.next.name}</span><span>あと {(detail.title.next.min-detail.total).toFixed(1)}pt</span></div>
              <div style={{height:6,borderRadius:3,background:"var(--bb)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:(detail.title.progress*100)+"%",background:"linear-gradient(90deg,#FFD700,#FF9500)"}} /></div>
            </div>}
            {CATEGORIES.filter(function(c){return detail.byCategory[c]>0}).map(function(cat){return (
              <div key={cat} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:36,fontSize:11,fontWeight:600,color:CC[cat]}}>{cat}</div>
                <div style={{flex:1,height:6,borderRadius:3,background:"var(--bb)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:(detail.byCategory[cat]/detail.total*100)+"%",background:CC[cat]}} /></div>
                <div style={{width:48,textAlign:"right",fontSize:12,fontWeight:600}}>{detail.byCategory[cat].toFixed(1)}</div>
              </div>
            )})}
          </div>
          <div style={{background:"var(--card)",borderRadius:16,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
            <div style={{padding:"16px 20px 10px",borderBottom:"1px solid var(--border)"}}><h3 style={{fontSize:14,fontWeight:700}}>記録一覧</h3></div>
            {detail.entries.slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"")}).map(function(e){return (
              <div key={e.id} style={{padding:"12px 20px",borderBottom:"1px solid var(--border)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                  <span style={{fontSize:14,fontWeight:600,flex:1,cursor:"pointer"}} onClick={function(){setDetE(e)}}>{e.title}</span>
                  <span style={{fontSize:10,padding:"1px 8px",borderRadius:10,background:CC[e.category]+"22",color:CC[e.category],fontWeight:600}}>{e.category}</span>
                  <span style={{fontSize:14,fontWeight:700,color:getMC(selMem,members)}}>+{cp(e.category,e.count).toFixed(1)}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#FF9500"}}>{"★".repeat(Math.round(e.rating))}{"☆".repeat(5-Math.round(e.rating))} {(e.rating||0).toFixed(1)}</span>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={function(){setForm(Object.assign({},e,{tagInput:""}));setEditId(e.id);setShowForm(true)}} style={{background:"none",color:"#007AFF",fontSize:11,fontWeight:600,padding:"5px 8px",border:"none",cursor:"pointer"}}>編集</button>
                    <button onClick={function(){save(entries.filter(function(x){return x.id!==e.id}))}} style={{background:"none",color:"#FF3B30",fontSize:11,fontWeight:600,padding:"5px 8px",border:"none",cursor:"pointer"}}>削除</button>
                  </div>
                </div>
                {e.comment && <div style={{fontSize:12,color:"var(--sub)",marginTop:6,padding:"6px 10px",background:"var(--card2)",borderRadius:10,fontStyle:"italic"}}>💬 {e.comment}</div>}
              </div>
            )})}
          </div>
        </div>}
      </div>

      {/* FAB */}
      <button onClick={function(){setEditId(null);setForm({member:selMem||members[0],title:"",category:"映画",count:1,rating:3,date:new Date().toISOString().split("T")[0],comment:"",recommendation:50,tags:[],spoiler:false,tagInput:""});setShowForm(true)}} style={{position:"fixed",bottom:28,right:28,width:56,height:56,borderRadius:28,background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",fontSize:28,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(0,122,255,.4)",zIndex:50,border:"none",cursor:"pointer"}}>+</button>

      {/* Detail Modal */}
      {detE && <div>
        <div onClick={function(){setDetE(null)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(12px)",zIndex:100}} />
        <div style={{position:"fixed",bottom:0,left:0,right:0,maxHeight:"90vh",background:"var(--card)",borderRadius:"20px 20px 0 0",zIndex:101,overflowY:"auto",padding:"28px 24px 40px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
            <div><span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:CC[detE.category]+"22",color:CC[detE.category],fontWeight:600}}>{detE.category}</span><h3 style={{fontSize:20,fontWeight:700,marginTop:8}}>{detE.title}</h3><div style={{fontSize:12,color:"var(--sub)",marginTop:4}}>{detE.member} · {detE.date||""}</div></div>
            <button onClick={function(){setDetE(null)}} style={{background:"var(--bb)",width:32,height:32,borderRadius:16,fontSize:14,border:"none",cursor:"pointer",color:"var(--sub)"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:16,marginBottom:16,flexWrap:"wrap"}}>
            <div><div style={{fontSize:11,color:"var(--sub)"}}>評価</div><div style={{color:"#FF9500"}}>{"★".repeat(Math.round(detE.rating))} {(detE.rating||0).toFixed(1)}</div></div>
            <div><div style={{fontSize:11,color:"var(--sub)"}}>教養pt</div><div style={{fontSize:22,fontWeight:800,color:"#007AFF"}}>{cp(detE.category,detE.count).toFixed(1)}</div></div>
          </div>
          {detE.comment && <div style={{padding:12,background:"var(--card2)",borderRadius:12,fontSize:13,lineHeight:1.7,marginBottom:16}}>{detE.comment}</div>}
          <a href={"https://www.amazon.co.jp/s?k="+encodeURIComponent(detE.title)} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:12,background:"var(--card2)",borderRadius:12,color:"#FF9500",fontWeight:700,fontSize:13,textDecoration:"none"}}>🔗 Amazonで探す</a>
        </div>
      </div>}

      {/* Form Modal */}
      {showForm && <div>
        <div onClick={function(){setShowForm(false);setEditId(null)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(12px)",zIndex:100}} />
        <div style={{position:"fixed",bottom:0,left:0,right:0,maxHeight:"92vh",background:"var(--card)",borderRadius:"20px 20px 0 0",zIndex:101,overflowY:"auto",padding:"28px 24px 40px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}>
            <h3 style={{fontSize:18,fontWeight:700}}>{editId?"記録を編集":"新しい記録"}</h3>
            <button onClick={function(){setShowForm(false);setEditId(null)}} style={{background:"var(--bb)",width:32,height:32,borderRadius:16,fontSize:14,border:"none",cursor:"pointer",color:"var(--sub)"}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>メンバー</label><select value={form.member} onChange={function(e){setForm(Object.assign({},form,{member:e.target.value}))}} style={{width:"100%"}}>{members.map(function(m){return <option key={m} value={m}>{m}</option>})}</select></div>
            <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>作品名</label><input value={form.title} onChange={function(e){setForm(Object.assign({},form,{title:e.target.value}))}} placeholder="タイトル" style={{width:"100%"}} /></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>カテゴリ</label><select value={form.category} onChange={function(e){setForm(Object.assign({},form,{category:e.target.value}))}} style={{width:"100%"}}>{CATEGORIES.map(function(c){return <option key={c} value={c}>{c}</option>})}</select></div>
              <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>{POINT_RATES[form.category].unit}数</label><input type="number" min="1" value={form.count} onChange={function(e){setForm(Object.assign({},form,{count:parseInt(e.target.value)||1}))}} style={{width:"100%"}} /></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>評価(0-5)</label><input type="range" min="0" max="50" value={Math.round((form.rating||0)*10)} onChange={function(e){setForm(Object.assign({},form,{rating:parseInt(e.target.value)/10}))}} style={{width:"100%"}} /><div style={{color:"#FF9500",fontSize:13,textAlign:"center"}}>{(form.rating||0).toFixed(1)} ★</div></div>
              <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>完了日</label><input type="date" value={form.date} onChange={function(e){setForm(Object.assign({},form,{date:e.target.value}))}} style={{width:"100%"}} /></div>
            </div>
            <div><label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>感想</label><textarea value={form.comment} onChange={function(e){setForm(Object.assign({},form,{comment:e.target.value}))}} placeholder="感想..." rows={3} style={{width:"100%",resize:"vertical"}} /></div>
            <div style={{background:"var(--card2)",borderRadius:12,padding:12,textAlign:"center"}}><span style={{fontSize:12,color:"var(--sub)"}}>獲得: </span><span style={{fontSize:20,fontWeight:800,color:"#007AFF"}}>{cp(form.category,form.count).toFixed(1)}</span><span style={{fontSize:12,color:"var(--sub)"}}> pt</span></div>
            <button onClick={handleSubmit} style={{background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",padding:14,borderRadius:14,fontSize:16,fontWeight:700,width:"100%",border:"none",cursor:"pointer"}}>{editId?"更新":"📚 記録する"}</button>
          </div>
        </div>
      </div>}

      {/* Wish Form */}
      {showWishForm && <div>
        <div onClick={function(){setShowWishForm(false)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100}} />
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--card)",borderRadius:"20px 20px 0 0",zIndex:101,padding:"28px 24px 40px"}}>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>📌 積読に追加</h3>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <input placeholder="タイトル" onChange={function(e){}} id="wish-title" style={{width:"100%"}} />
            <button onClick={function(){var t=document.getElementById("wish-title").value;if(!t.trim())return;saveWish(wishlist.concat([{id:Date.now().toString(),title:t,category:"本",member:members[0]}]));document.getElementById("wish-title").value="";setShowWishForm(false)}} style={{background:"linear-gradient(135deg,#007AFF,#5856D6)",color:"#fff",padding:14,borderRadius:14,fontSize:16,fontWeight:700,width:"100%",border:"none",cursor:"pointer"}}>📌 追加</button>
          </div>
        </div>
      </div>}

      {/* Settings */}
      {showSettings && <div>
        <div onClick={function(){setShowSettings(false)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(12px)",zIndex:100}} />
        <div style={{position:"fixed",bottom:0,left:0,right:0,maxHeight:"92vh",background:"var(--card)",borderRadius:"20px 20px 0 0",zIndex:101,overflowY:"auto",padding:"28px 24px 40px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}>
            <h3 style={{fontSize:18,fontWeight:700}}>⚙️ 設定</h3>
            <button onClick={function(){setShowSettings(false)}} style={{background:"var(--bb)",width:32,height:32,borderRadius:16,fontSize:14,border:"none",cursor:"pointer",color:"var(--sub)"}}>✕</button>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>アプリ名</label>
            <input value={config.appName} onChange={function(e){saveConfig(Object.assign({},config,{appName:e.target.value}))}} style={{width:"100%"}} />
          </div>
          <div>
            <label style={{fontSize:13,fontWeight:600,color:"var(--sub)",display:"block",marginBottom:6}}>メンバー</label>
            {members.map(function(m,i){return (
              <div key={m} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"var(--card2)",borderRadius:12,marginBottom:8}}>
                <div style={{width:24,height:24,borderRadius:12,background:PALETTE[i%PALETTE.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{getMI(m)}</div>
                <span style={{flex:1,fontSize:14,fontWeight:600}}>{m}</span>
                <button onClick={function(){if(confirm(m+"を削除？"))saveConfig(Object.assign({},config,{members:members.filter(function(x){return x!==m})}))}} style={{background:"none",color:"#FF3B30",fontSize:12,fontWeight:600,border:"none",cursor:"pointer"}}>削除</button>
              </div>
            )})}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={newMember} onChange={function(e){setNewMember(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"){if(newMember.trim()&&members.indexOf(newMember.trim())<0){saveConfig(Object.assign({},config,{members:members.concat([newMember.trim()])}));setNewMember("")}}}} placeholder="新メンバー名" style={{flex:1}} />
              <button onClick={function(){if(newMember.trim()&&members.indexOf(newMember.trim())<0){saveConfig(Object.assign({},config,{members:members.concat([newMember.trim()])}));setNewMember("")}}} style={{background:"#007AFF",color:"#fff",padding:"8px 16px",borderRadius:10,fontSize:13,fontWeight:600,border:"none",cursor:"pointer"}}>追加</button>
            </div>
          </div>
          <div style={{marginTop:20,padding:14,background:"var(--card2)",borderRadius:12,fontSize:12,color:"var(--sub)",lineHeight:1.6}}>
            <strong>称号一覧:</strong><br />{TITLES.map(function(t){return t.emoji+t.name+"("+t.min+"pt)"}).join(" → ")}
          </div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
